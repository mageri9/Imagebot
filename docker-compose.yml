services:
  bot:
    image: ${GHCR_IMAGE_NAME:-ghcr.io/mageri9/m9_imagebot}:latest
    container_name: m9_imagebot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - m9_imagebot_net
      - nexus_shared

  redis:
    image: redis:7-alpine
    container_name: m9_imagebot_redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - m9_imagebot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - m9_imagebot_net

volumes:
  m9_imagebot_redis_data:

networks:
  m9_imagebot_net:
    driver: bridge
  nexus_shared:
    external: true